    <body>
        <div id="map"></div>

        <!-- Export Button -->
        <button id="export-btn" class="export-btn" style="display: none;" onclick="exportGroundTruth()">📥 Export Ground Truth Points (GeoJSON)</button>

        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;
            highlightLayer.openPopup();
        }

        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[-8.564087388346637,126.68143613424972],[-8.514420441611708,126.73530120890665]]);

        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');

        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});

        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }

        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);

        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';

        var bounds_group = new L.featureGroup([]);

        function setBounds() {
        }

        map.createPane('pane_GoogleEarth_0');
        map.getPane('pane_GoogleEarth_0').style.zIndex = 400;
        var layer_GoogleEarth_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleEarth_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 18

        map.addLayer(layer_GoogleEarth_0);

        // === Your original raster layers (unchanged) ===
        map.createPane('pane_Subzones_1');
        map.getPane('pane_Subzones_1').style.zIndex = 401;
        var img_Subzones_1 = 'data/Subzones_1.png';
        var img_bounds_Subzones_1 = [[-8.588214222271057,126.6559627448977],[-8.40217203319698,126.78688881540414]];
        var layer_Subzones_1 = new L.imageOverlay(img_Subzones_1, img_bounds_Subzones_1, {pane: 'pane_Subzones_1'});
        bounds_group.addLayer(layer_Subzones_1);
        map.addLayer(layer_Subzones_1);

        map.createPane('pane_Zone5_2');
        map.getPane('pane_Zone5_2').style.zIndex = 402;

        var img_bounds_Zone5_2 = [[-8.588214222271057,126.6559627448977],[-8.40217203319698,126.78688881540414]];
        var layer_Zone5_2 = new L.imageOverlay(img_Zone5_2, img_bounds_Zone5_2, {pane: 'pane_Zone5_2'});
        bounds_group.addLayer(layer_Zone5_2);

        map.createPane('pane_Zone234_3');

        var img_bounds_FloodSusceptibility_7 = [[-8.588214221859461,126.65596274460012],[-8.402172033082914,126.78688881502687]];
        var layer_FloodSusceptibility_7 = new L.imageOverlay(img_FloodSusceptibility_7, img_bounds_FloodSusceptibility_7, {pane: 'pane_FloodSusceptibility_7'});

        var layer_LandUse_8 = new L.imageOverlay(img_LandUse_8, img_bounds_LandUse_8, {pane: 'pane_LandUse_8'});
        bounds_group.addLayer(layer_LandUse_8);
        map.addLayer(layer_LandUse_8);

        map.createPane('pane_Aspect_9');
        map.getPane('pane_Aspect_9').style.zIndex = 409;
        var img_Aspect_9 = 'data/Aspect_9.png';

        map.createPane('pane_Slope_10');
        map.getPane('pane_Slope_10').style.zIndex = 410;

        var img_bounds_Slope_10 = [[-8.588214222271057,126.6559627448977],[-8.40217203319698,126.78688881540414]];
        var layer_Slope_10 = new L.imageOverlay(img_Slope_10, img_bounds_Slope_10, {pane: 'pane_Slope_10'});
        bounds_group.addLayer(layer_Slope_10);
        map.addLayer(layer_Slope_10);

        map.createPane('pane_Elevation_11');
        map.getPane('pane_Elevation_11').style.zIndex = 411;
        var img_Elevation_11 = 'data/Elevation_11.png';
        var img_bounds_Elevation_11 = [[-8.588214222271057,126.6559627448977],[-8.40217203319698,126.78688881540414]];
        var layer_Elevation_11 = new L.imageOverlay(img_Elevation_11, img_bounds_Elevation_11, {pane: 'pane_Elevation_11'});
        bounds_group.addLayer(layer_Elevation_11);
        map.addLayer(layer_Elevation_11);

        // Suco Boundary Layer (your original)
        function pop_SucoBoundary_12(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr><th scope="row">SUCO</th><td>' + (feature.properties['SUCO'] !== null ? autolinker.link(String(feature.properties['SUCO']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['P_ADMIN'] !== null ? autolinker.link(String(feature.properties['P_ADMIN']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['MUNICIPIO'] !== null ? autolinker.link(String(feature.properties['MUNICIPIO']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['MCP_Code'] !== null ? autolinker.link(String(feature.properties['MCP_Code']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['P_Adm_Code'] !== null ? autolinker.link(String(feature.properties['P_Adm_Code']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['Suc_Code'] !== null ? autolinker.link(String(feature.properties['Suc_Code']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['CLASS'] !== null ? autolinker.link(String(feature.properties['CLASS']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['HECTARE_1'] !== null ? autolinker.link(String(feature.properties['HECTARE_1']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['WSNAME'] !== null ? autolinker.link(String(feature.properties['WSNAME']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['River_Name'] !== null ? autolinker.link(String(feature.properties['River_Name']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['ws_id'] !== null ? autolinker.link(String(feature.properties['ws_id']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['name_lower'] !== null ? autolinker.link(String(feature.properties['name_lower']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['name_upper'] !== null ? autolinker.link(String(feature.properties['name_upper']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['suco_id'] !== null ? autolinker.link(String(feature.properties['suco_id']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['criwdp_suc'] !== null ? autolinker.link(String(feature.properties['criwdp_suc']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) {
                addClassToPopupIfMedia(content, e.popup);
            });
            layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_SucoBoundary_12_0() {
            return {
                pane: 'pane_SucoBoundary_12',
                opacity: 1,
                color: 'rgba(255,255,255,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 5.0,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(231,113,72,0.0)',
                interactive: false,
            }
        }
        function style_SucoBoundary_12_1() {
            return {
                pane: 'pane_SucoBoundary_12',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(0,0,255,0.0)',
                interactive: false,
            }
        }

        map.createPane('pane_SucoBoundary_12');
        map.getPane('pane_SucoBoundary_12').style.zIndex = 412;
        map.getPane('pane_SucoBoundary_12').style['mix-blend-mode'] = 'normal';

        var layer_SucoBoundary_12 = new L.geoJson.multiStyle(json_SucoBoundary_12, {
            attribution: '',
            interactive: false,
            dataVar: 'json_SucoBoundary_12',
            layerName: 'layer_SucoBoundary_12',
            pane: 'pane_SucoBoundary_12',
            onEachFeature: pop_SucoBoundary_12,
            styles: [style_SucoBoundary_12_0,style_SucoBoundary_12_1,]
        });
        bounds_group.addLayer(layer_SucoBoundary_12);
        map.addLayer(layer_SucoBoundary_12);

        // ==================== GROUND TRUTH DATA COLLECTION (Fixed Delete) ====================
        var gtLayer = L.featureGroup().addTo(map);
        var groundTruthPoints = [];

        map.on('click', function(e) {
            var popupContent = `
                <strong>New Ground Truth Point</strong><br>
                Lat: ${e.latlng.lat.toFixed(5)}<br>
                Lng: ${e.latlng.lng.toFixed(5)}<br><br>
                <textarea id="gt-note" rows="5" cols="30" placeholder="Enter your field observation / note here..."></textarea><br><br>
                <button onclick="saveGT(${e.latlng.lat}, ${e.latlng.lng})">Save Observation</button>
            `;
            L.popup().setLatLng(e.latlng).setContent(popupContent).openOn(map);
        });

        window.saveGT = function(lat, lng) {
            var note = document.getElementById("gt-note").value.trim() || "No description";

            var marker = L.marker([lat, lng]).bindPopup(`
                <strong>Field Observation</strong><br>
                ${note}<br><br>
                <button onclick="deleteThisPoint(this)" style="color:red; padding:5px 10px; font-size:12px;">🗑 Delete Point</button>
            `).addTo(gtLayer);

            groundTruthPoints.push({
                type: "Feature",
                geometry: { type: "Point", coordinates: [lng, lat] },
                properties: {
                    timestamp: new Date().toISOString(),
                    note: note
                }
            });

            map.closePopup();
            document.getElementById("export-btn").style.display = "block";
        };

        // Fixed Delete Function
        window.deleteThisPoint = function(btn) {
            if (confirm("Delete this observation point?")) {
                var popup = btn.closest('.leaflet-popup');
                if (popup) {
                    // Find and remove the marker
                    map.eachLayer(function(layer) {
                        if (layer instanceof L.Marker && layer.getPopup() && layer.getPopup().getContent().includes(btn.parentNode.innerHTML)) {
                            gtLayer.removeLayer(layer);
                        }
                    });
                }
                alert("Point deleted.");
            }
        };

        // Export function
        window.exportGroundTruth = function() {
            if (groundTruthPoints.length === 0) {
                alert("No points to export.");
                return;
            }

            var geojson = {
                type: "FeatureCollection",
                features: groundTruthPoints
            };

            var dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(geojson, null, 2));
            var downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "wacrat_ground_truth_" + new Date().toISOString().slice(0,10) + ".geojson");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();

            alert("✅ GeoJSON exported! Open it in QGIS.");
        };

        // ==================== LAYER CONTROL (your original) ====================
        var overlaysTree = [
            {label: '<img src="legend/SucoBoundary_12.png" /> Suco Boundary', layer: layer_SucoBoundary_12},
            {label: "Elevation", layer: layer_Elevation_11},
            {label: "Slope", layer: layer_Slope_10},
            {label: "Aspect", layer: layer_Aspect_9},
            {label: "Land Use", layer: layer_LandUse_8},
            {label: "Flood Susceptibility", layer: layer_FloodSusceptibility_7},
            {label: "Landslide Susceptibility", layer: layer_LandslideSusceptibility_6},
            {label: "Fire Vulnerability", layer: layer_FireVulnerability_5},
            {label: "Climate Risk Hotspots", layer: layer_ClimateRiskHotspots_4},
            {label: "Zone 2-3-4", layer: layer_Zone234_3},
            {label: "Zone 5", layer: layer_Zone5_2},
            {label: "Sub-zones", layer: layer_Subzones_1},
            {label: "Google Earth", layer: layer_GoogleEarth_0, radioGroup: 'bm' },
            {label: "📍 Ground Truth Points", layer: gtLayer}
        ];

        var lay = L.control.layers.tree(null, overlaysTree,{
            collapsed: false,
        });
        lay.addTo(map);

        document.addEventListener("DOMContentLoaded", function() {
            function newLayersListHeight() {
                var layerScrollbarElement = document.querySelector('.leaflet-control-layers-scrollbar');
                if (layerScrollbarElement) {
                    var layersListElement = document.querySelector('.leaflet-control-layers-list');
                    var originalHeight = layersListElement.style.height || window.getComputedStyle(layersListElement).height;
                    var newHeight = parseFloat(originalHeight) - 50;
                    layersListElement.style.height = newHeight + 'px';
                }
            }
            var isLayersListExpanded = true;
            var controlLayersElement = document.querySelector('.leaflet-control-layers');
            var toggleLayerControl = document.querySelector('.leaflet-control-layers-toggle');

            toggleLayerControl.addEventListener('click', function() {
                if (isLayersListExpanded) {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                } else {
                    controlLayersElement.classList.add('leaflet-control-layers-expanded');
                }
                isLayersListExpanded = !isLayersListExpanded;
                newLayersListHeight();
            });

            if (controlLayersElement) {
                controlLayersElement.addEventListener('click', function(event) {
                    var toggleLayerHeaderPointer = event.target.closest('.leaflet-layerstree-header-pointer span');
                    if (toggleLayerHeaderPointer) {
                        newLayersListHeight();
                    }
                });
            }

            setTimeout(function() { toggleLayerControl.click(); }, 10);
            setTimeout(function() { toggleLayerControl.click(); }, 10);

            var isSmallScreen = window.innerWidth < 650;
            if (isSmallScreen) {
                setTimeout(function() {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                    isLayersListExpanded = !isLayersListExpanded;
                }, 500);
            }
        });

        setBounds();

        var i = 0;
        layer_SucoBoundary_12.eachLayer(function(layer) {
            var context = { feature: layer.feature, variables: {} };
            layer.bindTooltip((layer.feature.properties['SUCO'] !== null?String('<div style="color: #323232; font-size: 12pt; font-weight: bold; font-family: \'Calibri\', sans-serif;">' + layer.feature.properties['SUCO']) + '</div>':''), {permanent: true, offset: [-0, -16], className: 'css_SucoBoundary_12'});
            labels.push(layer);
            totalMarkers += 1;
            layer.added = true;
            addLabel(layer, i);
            i++;
